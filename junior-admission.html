<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中招生简章 - 大连市第五中学</title>
    <meta name="description" content="大连市第五中学初中招生简章占位页面，提供微信公众号招生简章入口。">
    <link rel="icon" type="image/jpeg" href="./images/五中logo.jpg">
    <link rel="stylesheet" href="./src/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div class="bg-school-red text-white text-xs py-2 px-4 text-center">
        <span class="inline-flex items-center gap-2">
            <i data-lucide="megaphone" class="w-3 h-3"></i>
            大连市第五中学初中招生信息
        </span>
    </div>

    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 lg:h-20">
                <a href="index.html" class="flex items-center gap-3 group">
                    <img src="./images/五中logo.jpg" alt="大连五中校徽" class="w-10 h-10 lg:w-12 lg:h-12 object-cover rounded-lg">
                    <div class="hidden sm:block">
                        <h1 class="text-lg lg:text-xl font-bold text-school-dark leading-tight">大连市第五中学</h1>
                        <p class="text-[10px] lg:text-xs text-slate-500 tracking-wider">DALIAN NO.5 MIDDLE SCHOOL</p>
                    </div>
                </a>
                <nav class="hidden md:flex items-center gap-8">
                    <a href="index.html#about" class="nav-link text-sm font-medium text-slate-700 hover:text-school-dark transition-colors">学校概况</a>
                    <a href="index.html#news" class="nav-link text-sm font-medium text-slate-700 hover:text-school-dark transition-colors">新闻中心</a>
                    <a href="index.html#admission" class="nav-link text-sm font-medium text-slate-700 hover:text-school-dark transition-colors">招生招聘</a>
                    <a href="index.html#contact" class="nav-link text-sm font-medium text-slate-700 hover:text-school-dark transition-colors">联系我们</a>
                </nav>
                <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-school-dark text-white text-sm rounded-full hover:bg-school-dark/90 transition-colors">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    返回首页
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="relative overflow-hidden bg-school-dark">
            <img src="./images/鸟瞰全景.jpg" alt="大连五中校园全景" class="absolute inset-0 w-full h-full object-cover opacity-35">
            <div class="absolute inset-0 bg-gradient-to-br from-school-dark/95 via-school-dark/80 to-school-red/70"></div>
            <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-28">
                <div class="max-w-3xl">
                    <span class="inline-flex items-center gap-2 px-4 py-1 bg-white/10 text-white/90 text-sm font-medium rounded-full border border-white/20 mb-6">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        ADMISSION
                    </span>
                    <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white text-shadow mb-6 leading-tight">初中招生简章</h2>
                    <p class="text-lg md:text-xl text-white/80 max-w-2xl">
                        招生简章内容正在整理中，当前可先通过学校微信公众号发布的招生简章获取详细信息。
                    </p>
                </div>
            </div>
        </section>

        <section class="py-16 lg:py-20 bg-slate-50">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid lg:grid-cols-[1fr_280px] gap-8 items-stretch">
                    <div class="bg-white rounded-2xl border border-slate-100 p-8 lg:p-10 card-hover">
                        <div class="w-14 h-14 bg-school-dark rounded-xl flex items-center justify-center mb-6">
                            <i data-lucide="external-link" class="w-7 h-7 text-white"></i>
                        </div>
                        <h3 class="text-2xl md:text-3xl font-bold text-slate-900 mb-4">微信公众号招生简章</h3>
                        <p class="text-slate-600 leading-relaxed mb-8">
                            请点击下方链接查看微信公众号原文，后续本页将补充校内整理版招生信息。
                        </p>
                        <a href="https://mp.weixin.qq.com/s/h_Nd8R3lApaKokx3U1x4wA" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-6 py-3 bg-school-gold text-school-dark font-bold rounded-full hover:bg-accent-400 transition-all hover:scale-105">
                            查看微信公众号招生简章
                            <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                        </a>
                    </div>

                    <aside class="bg-school-dark rounded-2xl p-8 text-white">
                        <p class="text-sm text-white/70 mb-4">扫码关注</p>
                        <div class="w-36 h-36 bg-white rounded-xl p-2 mb-6">
                            <img src="./images/公众号二维码.jpg" alt="大连市第五中学微信公众号二维码" class="w-full h-full object-contain rounded-lg">
                        </div>
                        <h4 class="font-bold text-lg mb-2">大连市第五中学微信公众号</h4>
                        <p class="text-sm text-white/75 leading-relaxed">获取最新招生动态、校园新闻与通知公告。</p>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="text-sm text-white/60">© 大连市第五中学</p>
            <div class="flex items-center gap-6 text-sm text-white/70">
                <a href="index.html#admission" class="hover:text-school-gold transition-colors">招生招聘</a>
                <a href="index.html#contact" class="hover:text-school-gold transition-colors">联系我们</a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
